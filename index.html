<!DOCTYPE html>
<html>
<head>
    <title>SIP Calculator</title>

    <!-- IMPORTANT for Mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>SIP Calculator</h2>

    <div class="input-group">
        <label>Monthly Investment (₹)</label>
        <input type="number" id="monthlyInvestment" placeholder="Enter amount">
    </div>

    <div class="input-group">
        <label>Expected Annual Return (%)</label>
        <input type="number" id="annualRate" placeholder="Enter rate">
    </div>

    <div class="input-group">
        <label>Investment Duration (Years)</label>
        <input type="number" id="years" placeholder="Enter years">
    </div>

    <button onclick="calculateSIP()">Calculate</button>

    <div class="result">
        <div class="result-box">
            <p>Invested Amount</p>
            <span>₹<span id="investedAmount">0</span></span>
        </div>

        <div class="result-box">
            <p>Estimated Returns</p>
            <span>₹<span id="estimatedReturns">0</span></span>
        </div>

        <div class="result-box total">
            <p>Total Value</p>
            <span>₹<span id="totalValue">0</span></span>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
